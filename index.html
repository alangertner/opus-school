<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>opus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    color: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .logo {
    display: block;
    width: clamp(280px, 50vw, 480px);
    height: auto;
    margin-bottom: 32px;
  }

  .wordmark {
    font-family: 'Sora', sans-serif;
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 400;
    letter-spacing: 0.08em;
    margin-bottom: 64px;
  }

  blockquote {
    max-width: 540px;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: clamp(14px, 2vw, 17px);
    line-height: 1.65;
    font-weight: 400;
    font-style: italic;
    color: #666;
    text-align: center;
  }

  cite {
    display: block;
    margin-top: 16px;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: clamp(12px, 1.6vw, 14px);
    font-style: normal;
    font-weight: 400;
    color: #999;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="hero">
  <img src="logo.png" alt="opus" class="logo">
  <div class="wordmark">opus</div>
  <blockquote>
    &ldquo;Let the main object of education be to seek and to find a method of instruction, by which teachers may teach less, but learners may learn more.&rdquo;
    <cite>Comenius, 1632</cite>
  </blockquote>
</div>
</body>
</html>
